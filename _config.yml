title: Tenzing Research
description: AI-powered equity analysis focused on quality growth and asymmetric risk/reward.
url: "https://tomsabe.github.io"
baseurl: "/ideas"
lang: en-US
timezone: America/New_York

remote_theme: b2a3e8/jekyll-theme-console

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

header_pages:
  - about.md

permalink: /:year/:month/:day/:title/
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Tenzing
