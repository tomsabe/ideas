---
layout: default
---
<article class="page-frame">
  <header class="content-header">
    {% if page.title %}
      <h1>{{ page.title }}</h1>
    {% endif %}
    {% if page.description %}
      <p class="lede">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="content-body">
    {{ content }}
  </div>
</article>
